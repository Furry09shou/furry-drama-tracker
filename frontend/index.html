  <body>
    <div id="root"></div>
    <script>
      // IE 和不兼容浏览器检测（在 ES Module 加载前运行，使用 ES5 语法保证兼容）
      (function() {
        var ua = navigator.userAgent;
        var isIE = /MSIE|Trident/i.test(ua);
        var isOldEdge = /Edge\/\d+/i.test(ua) && !/Edg\/\d+/i.test(ua);
        if (!isIE && !isOldEdge) return;

        var I18N = {
          zh: {
            title: '抱歉，当前浏览器无法正常打开',
            reasonLabel: '具体情况',
            reasonIE: '当前使用的是 Internet Explorer，这款浏览器已经停止更新，在打开很多网站时都会遇到问题。换一款其他浏览器就可以正常访问了。',
            reasonEdgeLegacy: '当前使用的是旧版 Microsoft Edge，这款浏览器已经不再更新。安装新版 Edge（基于 Chromium）或其他浏览器后即可正常访问。',
            solutionTitle: '换一款浏览器试试？',
            hint: '感谢你的理解，换一款浏览器就能正常访问啦。如果已经是最新版浏览器仍有问题，欢迎反馈给我们。',
            langToggle: 'EN',
            downloadCN: '国内下载',
            downloadGlobal: '国际下载',
            chrome: 'Google Chrome',
            edge: 'Microsoft Edge（新版，基于 Chromium）',
            firefox: 'Mozilla Firefox'
          },
          en: {
            title: 'Sorry, this browser cannot display properly',
            reasonLabel: 'Details',
            reasonIE: 'You are using Internet Explorer, which is no longer updated and may have trouble opening many websites. Switching to another browser should fix this.',
            reasonEdgeLegacy: 'You are using the legacy version of Microsoft Edge, which is no longer updated. Installing the new Edge (Chromium-based) or another browser should allow you to access the site normally.',
            solutionTitle: 'How about trying another browser?',
            hint: 'Thanks for your understanding — switching to another browser should do the trick. If you are already using the latest version and still have issues, feel free to let us know.',
            langToggle: '中文',
            downloadCN: 'China',
            downloadGlobal: 'Global',
            chrome: 'Google Chrome',
            edge: 'Microsoft Edge (Chromium-based)',
            firefox: 'Mozilla Firefox'
          }
        };

        var currentLang = 'zh';
        try {
          var saved = localStorage.getItem('lang');
          if (saved && I18N[saved]) currentLang = saved;
          else if (navigator.language && navigator.language.toLowerCase().indexOf('en') === 0) currentLang = 'en';
        } catch (e) {}

        var BROWSERS = [
          { cn: 'https://www.google.cn/chrome/', global: 'https://www.google.com/chrome/' },
          { cn: 'https://www.microsoft.com/zh-cn/edge', global: 'https://www.microsoft.com/en-us/edge' },
          { cn: 'http://www.firefox.com.cn/', global: 'https://www.mozilla.org/en-US/firefox/' }
        ];
        var BROWSER_NAMES = ['chrome', 'edge', 'firefox'];

        function render() {
          var L = I18N[currentLang];
          var reasonText = isIE ? L.reasonIE : L.reasonEdgeLegacy;

          var browserCards = '';
          for (var i = 0; i < BROWSERS.length; i++) {
            var b = BROWSERS[i];
            var name = L[BROWSER_NAMES[i]];
            browserCards +=
              '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;">' +
                '<div style="font-size:14px;font-weight:600;color:#334155;margin-bottom:10px;">' + name + '</div>' +
                '<div style="display:flex;gap:8px;">' +
                  '<a href="' + b.cn + '" style="flex:1;text-align:center;padding:9px 12px;border-radius:8px;background:#6366f1;color:#fff;text-decoration:none;font-size:13px;font-weight:600;">' + L.downloadCN + '</a>' +
                  '<a href="' + b.global + '" style="flex:1;text-align:center;padding:9px 12px;border-radius:8px;background:#fff;border:1px solid #c7d2fe;color:#6366f1;text-decoration:none;font-size:13px;font-weight:600;">' + L.downloadGlobal + '</a>' +
                '</div>' +
              '</div>';
          }

          return (
            '<div style="position:fixed;top:14px;right:16px;z-index:2147483648;">' +
              '<button onclick="window.__switchCompatLang()" style="background:#fff;border:1px solid #c7d2fe;color:#6366f1;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(99,102,241,0.15);">' + L.langToggle + '</button>' +
            '</div>' +
            '<div style="max-width:560px;width:100%;background:#fff;border-radius:16px;padding:36px 32px;box-shadow:0 25px 50px -12px rgba(99,102,241,0.18);border:1px solid #e2e8f0;text-align:center;">' +
              '<div style="font-size:56px;margin-bottom:14px;line-height:1;">\uD83D\uDE05</div>' +
              '<h1 style="font-size:23px;font-weight:700;margin:0 0 16px 0;color:#1e293b;">' + L.title + '</h1>' +
              '<div style="font-size:14px;line-height:1.7;color:#64748b;margin-bottom:22px;text-align:left;padding:14px 16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0;">' +
                '<strong style="color:#6366f1;display:block;margin-bottom:4px;">' + L.reasonLabel + '</strong>' + reasonText +
              '</div>' +
              '<div style="font-size:15px;font-weight:600;color:#475569;margin-bottom:12px;">' + L.solutionTitle + '</div>' +
              '<div style="display:flex;flex-direction:column;gap:10px;">' + browserCards + '</div>' +
              '<p style="margin:22px 0 0 0;font-size:12px;color:#94a3b8;line-height:1.6;">' + L.hint + '</p>' +
            '</div>'
          );
        }

        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#eef2ff 0%,#fdf4ff 50%,#eef2ff 100%);color:#1e293b;font-family:"Segoe UI","Microsoft YaHei",sans-serif;z-index:2147483647;display:flex;align-items:center;justify-content:center;padding:20px;';

        function paint() {
          overlay.innerHTML = render();
          try { document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en'; } catch (e) {}
        }

        window.__switchCompatLang = function() {
          currentLang = currentLang === 'zh' ? 'en' : 'zh';
          try { localStorage.setItem('lang', currentLang); } catch (e) {}
          paint();
        };

        paint();
        document.body.insertBefore(overlay, document.body.firstChild);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>

  </body>
